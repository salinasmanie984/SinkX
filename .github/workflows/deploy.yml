name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 自动创建 KV（已存在会报错但不影响，忽略错误）
      - name: Create KV Namespace (if not exists)
        run: npx wrangler kv namespace create sink 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # 查询 KV ID 并动态写入 wrangler.jsonc
      - name: Inject KV Namespace ID into wrangler.jsonc
        run: |
          KV_ID=$(npx wrangler kv namespace list | jq -r '.[] | select(.title == "sink") | .id')
          echo "KV Namespace ID: $KV_ID"
          # 用 sed 替换 wrangler.jsonc 里的占位 ID
          sed -i "s/\"id\": \".*\" \/\/ IMPORTANT.*$/\"id\": \"$KV_ID\"/" wrangler.jsonc
          sed -i "s/\"preview_id\": \".*\"/\"preview_id\": \"$KV_ID\"/" wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: pnpm run build
        env:
          NUXT_SITE_TOKEN: ${{ secrets.NUXT_SITE_TOKEN }}
          NUXT_CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NUXT_CF_API_TOKEN: ${{ secrets.NUXT_CF_API_TOKEN }}

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
